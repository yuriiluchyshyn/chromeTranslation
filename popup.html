<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 220px;
      padding: 10px;
      font-family: Arial, sans-serif;
    }
    .control-group {
      margin-bottom: 15px;
    }
    .toggle-container {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .switch {
      position: relative;
      width: 50px;
      height: 24px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 24px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #666;
    }
    input:checked + .slider:before {
      transform: translateX(26px);
    }
    .checkbox-container {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }
    .clear-btn {
      background: #777;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      width: 100%;
    }
    .clear-btn:hover {
      background: #555;
    }
  </style>
</head>
<body>
  <div class="control-group">
    <div class="toggle-container">
      <span>Translator:</span>
      <label class="switch">
        <input type="checkbox" id="toggleExtension">
        <span class="slider"></span>
      </label>
    </div>
    
    <div class="checkbox-container">
      <input type="checkbox" id="compactMode">
      <label for="compactMode">Compact view</label>
    </div>
  </div>
  
  <div class="control-group">
    <button class="clear-btn" id="clearTranslations">Clear All Translations</button>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
